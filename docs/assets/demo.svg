<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 560" width="840" height="560">
  <defs>
    <style>
      .t { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; font-size: 13px; }
      .b { font-weight: 700; }
      .label { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #6b7280; }
    </style>
  </defs>

  <!-- Clean background -->
  <rect width="840" height="560" fill="#ffffff"/>

  <!-- Terminal frame -->
  <rect x="24" y="16" width="792" height="528" rx="8" fill="#1e1e2e" stroke="#d1d5db" stroke-width="1"/>

  <!-- Tab bar -->
  <rect x="24" y="16" width="792" height="32" rx="8" fill="#2d2d3f"/>
  <rect x="24" y="40" width="792" height="8" fill="#2d2d3f"/>
  <!-- Active tab -->
  <rect x="32" y="22" width="140" height="24" rx="4" fill="#1e1e2e"/>
  <text x="52" y="38" class="t" fill="#9ca3af" font-size="11">Terminal — zsh</text>
  <!-- Tab dot -->
  <circle cx="42" cy="34" r="3" fill="#6ee7b7"/>

  <!-- ════════ Line 1: prompt ════════ -->
  <g>
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.2s" fill="freeze"/>
    <text x="40" y="72" class="t" fill="#a78bfa">~/openclaw</text>
    <text x="150" y="72" class="t" fill="#6b7280">$</text>
    <text x="164" y="72" class="t" fill="#e5e7eb">entroly demo</text>
  </g>

  <!-- ════════ Line 2-3: indexing ════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.2s" fill="freeze"/>
    <text x="40" y="100" class="t" fill="#6b7280">Indexing workspace...</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.2s" fill="freeze"/>
    <text x="40" y="120" class="t" fill="#6ee7b7">✓</text>
    <text x="56" y="120" class="t" fill="#d1d5db">24 files indexed (2,348 tokens) in 0.05ms</text>
  </g>

  <!-- ════════ WITHOUT ENTROLY section ════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/>

    <text x="40" y="154" class="t b" fill="#f87171">Without Entroly</text>
    <text x="40" y="176" class="t" fill="#9ca3af">  Budget: 2,048 tokens</text>
    <text x="40" y="196" class="t" fill="#9ca3af">  Files loaded: 15 of 24</text>
    <text x="250" y="196" class="t" fill="#f87171">(9 files invisible)</text>
    <text x="40" y="216" class="t" fill="#9ca3af">  Tokens used: 2,031 / 2,048</text>
    <text x="310" y="216" class="t" fill="#6b7280">(99.2% of budget)</text>
  </g>

  <!-- Missing files list -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.3s" fill="freeze"/>
    <text x="40" y="244" class="t" fill="#6b7280">  Missing:</text>
    <text x="40" y="262" class="t" fill="#f87171">    ✗ skills/system.md</text>
    <text x="260" y="262" class="t" fill="#6b7280">— agent can't manage Docker</text>
    <text x="40" y="280" class="t" fill="#f87171">    ✗ tools/search_emails.json</text>
    <text x="300" y="280" class="t" fill="#6b7280">— can't search inbox</text>
    <text x="40" y="298" class="t" fill="#f87171">    ✗ tools/send_email.json</text>
    <text x="286" y="298" class="t" fill="#6b7280">— can't send email</text>
    <text x="40" y="316" class="t" fill="#6b7280">    ... and 6 more</text>
  </g>

  <!-- ════════ WITH ENTROLY section ════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.0s" dur="0.3s" fill="freeze"/>

    <text x="40" y="350" class="t b" fill="#6ee7b7">With Entroly</text>
    <text x="40" y="372" class="t" fill="#9ca3af">  Budget: 2,048 tokens</text>
    <text x="40" y="392" class="t" fill="#9ca3af">  Files loaded:</text>
    <text x="170" y="392" class="t b" fill="#6ee7b7">24 of 24</text>
    <text x="280" y="392" class="t" fill="#6b7280">(100% coverage)</text>
    <text x="40" y="412" class="t" fill="#9ca3af">  Tokens used: 1,812 / 2,048</text>
    <text x="310" y="412" class="t" fill="#6b7280">(88.5% — 22.7% saved)</text>
  </g>

  <!-- Compression breakdown -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.8s" dur="0.3s" fill="freeze"/>
    <text x="40" y="440" class="t" fill="#6b7280">  Compression:</text>
    <text x="40" y="458" class="t" fill="#d1d5db">    SOUL.md, MEMORY.md</text>
    <text x="310" y="458" class="t" fill="#6b7280">→ full</text>
    <text x="40" y="476" class="t" fill="#d1d5db">    daily/2024-03-20.md +1</text>
    <text x="310" y="476" class="t" fill="#6b7280">→ skeleton</text>
    <text x="40" y="494" class="t" fill="#d1d5db">    tools/*.json (9 files)</text>
    <text x="310" y="494" class="t" fill="#6b7280">→ reference</text>
  </g>

  <!-- Summary line -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="7.0s" dur="0.3s" fill="freeze"/>
    <text x="40" y="526" class="t" fill="#6ee7b7">✓</text>
    <text x="56" y="526" class="t" fill="#e5e7eb">All 24 files visible. 22.7% fewer tokens. 0.05ms overhead.</text>
  </g>

  <!-- Blinking cursor -->
  <rect x="610" y="514" width="7" height="14" fill="#e5e7eb">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
