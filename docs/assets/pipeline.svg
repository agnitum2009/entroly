<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="900" height="440">
  <defs>
    <style>
      .title { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; font-size: 16px; font-weight: 700; fill: #111827; }
      .subtitle { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #6b7280; }
      .box-label { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; font-size: 11px; font-weight: 600; fill: #111827; }
      .box-detail { font-family: 'SF Mono', 'Consolas', monospace; font-size: 9px; fill: #6b7280; }
      .box-metric { font-family: 'SF Mono', 'Consolas', monospace; font-size: 9px; font-weight: 600; fill: #16a34a; }
      .stage-num { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; font-size: 10px; font-weight: 700; fill: #ffffff; }
      .stage-label { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; font-size: 10px; font-weight: 600; }
      .arrow-label { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; font-size: 8px; fill: #9ca3af; }
      .stat-label { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; font-size: 10px; font-weight: 600; }
    </style>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#d1d5db"/>
    </marker>
    <marker id="arrFeedback" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="440" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" class="title">How Entroly Optimizes Every Request</text>
  <text x="450" y="44" text-anchor="middle" class="subtitle">5-stage pipeline · &lt;10ms total · Rust core via PyO3</text>

  <!-- ════════ STAGE 1: INGEST ════════ -->
  <circle cx="95" cy="68" r="10" fill="#2563eb"/>
  <text x="95" y="72" text-anchor="middle" class="stage-num">1</text>
  <text x="112" y="72" class="stage-label" fill="#2563eb">Ingest</text>

  <rect x="20" y="84" width="150" height="60" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="95" y="102" text-anchor="middle" class="box-label">Codebase Scan</text>
  <text x="95" y="116" text-anchor="middle" class="box-detail">git ls-files · 50+ langs</text>
  <text x="95" y="130" text-anchor="middle" class="box-detail">auto-detect project type</text>
  <text x="95" y="140" text-anchor="middle" class="box-metric">186,420 raw tokens</text>

  <line x1="95" y1="144" x2="95" y2="160" stroke="#d1d5db" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="20" y="163" width="150" height="52" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="95" y="181" text-anchor="middle" class="box-label">SimHash + Skeleton</text>
  <text x="95" y="195" text-anchor="middle" class="box-detail">64-bit fingerprints · O(1)</text>
  <text x="95" y="207" text-anchor="middle" class="box-metric">60-80% body reduction</text>

  <line x1="95" y1="215" x2="95" y2="231" stroke="#d1d5db" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="20" y="234" width="150" height="48" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="95" y="252" text-anchor="middle" class="box-label">Dependency Graph</text>
  <text x="95" y="266" text-anchor="middle" class="box-detail">imports · calls · type refs</text>
  <text x="95" y="276" text-anchor="middle" class="box-metric">auto-linked context</text>

  <!-- ════════ STAGE 2: SCORE ════════ -->
  <circle cx="285" cy="68" r="10" fill="#7c3aed"/>
  <text x="285" y="72" text-anchor="middle" class="stage-num">2</text>
  <text x="302" y="72" class="stage-label" fill="#7c3aed">Score</text>

  <line x1="170" y1="114" x2="200" y2="114" stroke="#d1d5db" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="203" y="84" width="164" height="56" rx="4" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="285" y="102" text-anchor="middle" class="box-label">Shannon Entropy</text>
  <text x="285" y="116" text-anchor="middle" class="box-detail">multi-scale n-gram scoring</text>
  <text x="285" y="130" text-anchor="middle" class="box-detail">boilerplate detection</text>
  <text x="285" y="140" text-anchor="middle" class="box-metric">H(x) = -Σ p·log₂(p)</text>

  <rect x="203" y="152" width="164" height="52" rx="4" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="285" y="170" text-anchor="middle" class="box-label">Query Analysis</text>
  <text x="285" y="184" text-anchor="middle" class="box-detail">TF-IDF · intent classification</text>
  <text x="285" y="198" text-anchor="middle" class="box-metric">16D feature vector</text>

  <rect x="203" y="216" width="164" height="52" rx="4" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="285" y="234" text-anchor="middle" class="box-label">Query Persona (PSM)</text>
  <text x="285" y="248" text-anchor="middle" class="box-detail">RBF kernel · Pitman-Yor</text>
  <text x="285" y="262" text-anchor="middle" class="box-metric">per-archetype weights</text>

  <line x1="170" y1="258" x2="200" y2="242" stroke="#d1d5db" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ════════ STAGE 3: SELECT ════════ -->
  <circle cx="485" cy="68" r="10" fill="#16a34a"/>
  <text x="485" y="72" text-anchor="middle" class="stage-num">3</text>
  <text x="502" y="72" class="stage-label" fill="#16a34a">Select</text>

  <line x1="367" y1="114" x2="397" y2="108" stroke="#d1d5db" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="400" y="84" width="170" height="48" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="485" y="102" text-anchor="middle" class="box-label">SAST Security Scan</text>
  <text x="485" y="116" text-anchor="middle" class="box-detail">55 rules · 8 CWE categories</text>
  <text x="485" y="128" text-anchor="middle" class="box-metric">flag before AI sees it</text>

  <line x1="367" y1="178" x2="397" y2="162" stroke="#d1d5db" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="400" y="144" width="170" height="60" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="485" y="162" text-anchor="middle" class="box-label">KKT Knapsack</text>
  <text x="485" y="176" text-anchor="middle" class="box-detail">soft bisection O(30N)</text>
  <text x="485" y="190" text-anchor="middle" class="box-detail">budget-exact selection</text>
  <text x="485" y="200" text-anchor="middle" class="box-metric">Σ σ((sᵢ-λ*cᵢ)/τ)·cᵢ = B</text>

  <line x1="367" y1="242" x2="397" y2="234" stroke="#d1d5db" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="400" y="216" width="170" height="56" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="485" y="234" text-anchor="middle" class="box-label">IOS + Diversity</text>
  <text x="485" y="248" text-anchor="middle" class="box-detail">submodular diversity penalty</text>
  <text x="485" y="262" text-anchor="middle" class="box-detail">full / skeleton / reference</text>
  <text x="485" y="272" text-anchor="middle" class="box-metric">(1-1/e) ≈ 63% optimal</text>

  <!-- ════════ STAGE 4: DELIVER ════════ -->
  <circle cx="695" cy="68" r="10" fill="#0891b2"/>
  <text x="695" y="72" text-anchor="middle" class="stage-num">4</text>
  <text x="712" y="72" class="stage-label" fill="#0891b2">Deliver</text>

  <line x1="570" y1="155" x2="600" y2="130" stroke="#d1d5db" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="603" y="84" width="184" height="100" rx="4" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1"/>
  <text x="695" y="102" text-anchor="middle" class="box-label">3-Level Context Pyramid</text>
  <!-- L1 -->
  <rect x="650" y="110" width="90" height="16" rx="3" fill="#cffafe" stroke="#67e8f9" stroke-width="0.5"/>
  <text x="695" y="122" text-anchor="middle" class="box-detail" fill="#0891b2">L1: All files (5%)</text>
  <!-- L2 -->
  <rect x="637" y="130" width="116" height="16" rx="3" fill="#cffafe" stroke="#67e8f9" stroke-width="0.5"/>
  <text x="695" y="142" text-anchor="middle" class="box-detail" fill="#0891b2">L2: Dep clusters (25%)</text>
  <!-- L3 -->
  <rect x="623" y="150" width="144" height="16" rx="3" fill="#cffafe" stroke="#67e8f9" stroke-width="0.5"/>
  <text x="695" y="162" text-anchor="middle" class="box-detail" fill="#0891b2">L3: Full fragments (70%)</text>
  <text x="695" y="180" text-anchor="middle" class="box-metric">100% codebase visibility</text>

  <!-- Your AI Tool -->
  <line x1="695" y1="184" x2="695" y2="200" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="603" y="203" width="184" height="52" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="695" y="223" text-anchor="middle" class="box-label">→ Your AI Tool</text>
  <text x="695" y="239" text-anchor="middle" class="box-metric" font-size="10">41,200 tokens (was 186,420)</text>
  <text x="695" y="251" text-anchor="middle" class="box-metric" font-size="11">78% saved · 8.2ms</text>

  <line x1="570" y1="252" x2="600" y2="235" stroke="#d1d5db" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ════════ STAGE 5: LEARN (feedback loop) ════════ -->
  <circle cx="485" cy="310" r="10" fill="#d97706"/>
  <text x="485" y="314" text-anchor="middle" class="stage-num">5</text>
  <text x="502" y="314" class="stage-label" fill="#d97706">Learn</text>

  <rect x="310" y="326" width="150" height="56" rx="4" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="385" y="344" text-anchor="middle" class="box-label">PRISM Optimizer</text>
  <text x="385" y="358" text-anchor="middle" class="box-detail">spectral natural gradient</text>
  <text x="385" y="372" text-anchor="middle" class="box-detail">4×4 eigendecomposition</text>
  <text x="385" y="382" text-anchor="middle" class="box-metric">w += α Q Λ⁻¹ᐟ² Qᵀ g</text>

  <rect x="475" y="326" width="150" height="56" rx="4" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="550" y="344" text-anchor="middle" class="box-label">Utilization Score</text>
  <text x="550" y="358" text-anchor="middle" class="box-detail">trigram + identifier overlap</text>
  <text x="550" y="372" text-anchor="middle" class="box-detail">with LLM response</text>
  <text x="550" y="382" text-anchor="middle" class="box-metric">closed-loop feedback</text>

  <rect x="640" y="326" width="150" height="56" rx="4" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="715" y="344" text-anchor="middle" class="box-label">Self-Tuning Temp</text>
  <text x="715" y="358" text-anchor="middle" class="box-detail">Fisher-calibrated</text>
  <text x="715" y="372" text-anchor="middle" class="box-detail">no manual τ setting</text>
  <text x="715" y="382" text-anchor="middle" class="box-metric">τ adapts per query</text>

  <!-- Feedback arrows -->
  <path d="M 750 255 Q 810 290 750 324" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrFeedback)"/>
  <text x="782" y="290" class="arrow-label" fill="#d97706">response</text>

  <line x1="475" y1="354" x2="462" y2="354" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrFeedback)"/>

  <path d="M 310 354 Q 200 354 200 300 Q 200 280 202 268" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrFeedback)"/>
  <text x="180" y="310" class="arrow-label" fill="#d97706" transform="rotate(-90 180 310)">weights update</text>

  <!-- ════════ BOTTOM STATS BAR ════════ -->
  <rect x="20" y="400" width="860" height="32" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="80" y="420" text-anchor="middle" class="stat-label" fill="#2563eb">19 Modules</text>
  <text x="200" y="420" text-anchor="middle" class="stat-label" fill="#7c3aed">249 Tests</text>
  <text x="320" y="420" text-anchor="middle" class="stat-label" fill="#16a34a">55 SAST Rules</text>
  <text x="450" y="420" text-anchor="middle" class="stat-label" fill="#0891b2">&lt;10ms Latency</text>
  <text x="570" y="420" text-anchor="middle" class="stat-label" fill="#d97706">Self-Learning</text>
  <text x="700" y="420" text-anchor="middle" class="stat-label" fill="#dc2626">Zero Config</text>
  <text x="830" y="420" text-anchor="middle" class="stat-label" fill="#6b7280">Rust + PyO3</text>
</svg>
