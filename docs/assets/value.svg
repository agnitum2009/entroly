<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" width="860" height="300">
  <defs>
    <style>
      .heading { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; font-size: 15px; font-weight: 700; }
      .subheading { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #6b7280; }
      .label { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; font-size: 12px; fill: #374151; }
      .value { font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; }
      .metric-big { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; font-size: 22px; font-weight: 700; }
      .metric-label { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; font-size: 10px; fill: #6b7280; }
      .tag { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; font-size: 10px; font-weight: 600; fill: #ffffff; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="300" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" class="heading" fill="#111827">Before and After — Real Numbers From an OpenClaw Workspace</text>
  <text x="430" y="44" text-anchor="middle" class="subheading">24-file workspace · 2,048 token budget · measured with python benchmarks/openclaw_benchmark.py</text>

  <!-- ═══ LEFT: Without Entroly ═══ -->
  <rect x="20" y="56" width="400" height="148" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="40" y="78" class="heading" fill="#dc2626">Without Entroly</text>

  <!-- Rows -->
  <text x="40" y="100" class="label">Files visible to AI</text>
  <text x="290" y="100" class="value" fill="#dc2626">15 of 24</text>
  <!-- Bar -->
  <rect x="290" y="107" width="110" height="6" rx="3" fill="#fecaca"/>
  <rect x="290" y="107" width="69" height="6" rx="3" fill="#dc2626"/>

  <text x="40" y="128" class="label">Codebase coverage</text>
  <text x="290" y="128" class="value" fill="#dc2626">62.5%</text>

  <text x="40" y="152" class="label">Tokens used</text>
  <text x="290" y="152" class="value" fill="#dc2626">2,031 of 2,048</text>
  <text x="395" y="152" class="subheading">(99.2%)</text>

  <text x="40" y="176" class="label">Missing critical files</text>
  <text x="290" y="176" class="value" fill="#dc2626">9 files</text>
  <text x="344" y="176" class="subheading">— emails, docker, git, tests</text>

  <text x="40" y="196" class="label">Learns from outcomes</text>
  <text x="290" y="196" class="value" fill="#9ca3af">No</text>

  <!-- ═══ RIGHT: With Entroly ═══ -->
  <rect x="440" y="56" width="400" height="148" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="460" y="78" class="heading" fill="#16a34a">With Entroly</text>

  <text x="460" y="100" class="label">Files visible to AI</text>
  <text x="710" y="100" class="value" fill="#16a34a">24 of 24</text>
  <!-- Bar -->
  <rect x="710" y="107" width="110" height="6" rx="3" fill="#bbf7d0"/>
  <rect x="710" y="107" width="110" height="6" rx="3" fill="#16a34a"/>

  <text x="460" y="128" class="label">Codebase coverage</text>
  <text x="710" y="128" class="value" fill="#16a34a">100.0%</text>

  <text x="460" y="152" class="label">Tokens used</text>
  <text x="710" y="152" class="value" fill="#16a34a">1,812 of 2,048</text>
  <text x="818" y="152" class="subheading">(88.5%)</text>

  <text x="460" y="176" class="label">Token savings</text>
  <text x="710" y="176" class="value" fill="#16a34a">22.7%</text>
  <!-- Savings badge -->
  <rect x="756" y="166" width="54" height="18" rx="9" fill="#16a34a"/>
  <text x="783" y="179" text-anchor="middle" class="tag">saved</text>

  <text x="460" y="196" class="label">Learns from outcomes</text>
  <text x="710" y="196" class="value" fill="#16a34a">Yes</text>
  <text x="740" y="196" class="subheading">(PRISM RL)</text>

  <!-- ═══ BOTTOM: Key metrics row ═══ -->
  <line x1="30" y1="218" x2="830" y2="218" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Metric 1 -->
  <text x="115" y="252" text-anchor="middle" class="metric-big" fill="#16a34a">100%</text>
  <text x="115" y="268" text-anchor="middle" class="metric-label">Codebase Coverage</text>

  <!-- Metric 2 -->
  <text x="310" y="252" text-anchor="middle" class="metric-big" fill="#2563eb">0.05ms</text>
  <text x="310" y="268" text-anchor="middle" class="metric-label">Optimization Time</text>

  <!-- Metric 3 -->
  <text x="505" y="252" text-anchor="middle" class="metric-big" fill="#7c3aed">3 levels</text>
  <text x="505" y="268" text-anchor="middle" class="metric-label">Full → Skeleton → Reference</text>

  <!-- Metric 4 -->
  <text x="700" y="252" text-anchor="middle" class="metric-big" fill="#d97706">22.7%</text>
  <text x="700" y="268" text-anchor="middle" class="metric-label">Fewer Tokens</text>

  <!-- Bottom -->
  <text x="430" y="294" text-anchor="middle" class="subheading">pip install entroly — one command, zero config, works with any AI tool</text>
</svg>
