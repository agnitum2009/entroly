<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Entroly — Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f9fafb;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .wrapper {
    max-width: 840px;
    width: 100%;
  }
  .terminal {
    background: #1e1e2e;
    border: 1px solid #374151;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  }
  .tab-bar {
    background: #2d2d3f;
    height: 36px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
  }
  .tab {
    background: #1e1e2e;
    border-radius: 4px;
    padding: 4px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #6ee7b7;
  }
  .tab-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #9ca3af;
  }
  .content {
    padding: 16px 20px 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
    min-height: 420px;
  }
  .line {
    opacity: 0;
    transform: translateY(3px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    white-space: pre;
  }
  .line.show {
    opacity: 1;
    transform: translateY(0);
  }
  .cursor {
    display: inline-block;
    width: 7px; height: 14px;
    background: #e5e7eb;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
    opacity: 0;
  }
  .cursor.show { opacity: 1; }
  @keyframes blink { 50% { opacity: 0; } }
  .controls {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 12px;
    background: #2d2d3f;
    border-top: 1px solid #374151;
  }
  .controls button {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 12px;
    background: #1e1e2e;
    color: #e5e7eb;
    border: 1px solid #374151;
    border-radius: 4px;
    padding: 6px 16px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .controls button:hover { background: #374151; }
</style>
</head>
<body>
<div class="wrapper">
<div class="terminal">
  <div class="tab-bar">
    <div class="tab">
      <span class="tab-dot"></span>
      <span class="tab-text">Terminal — zsh</span>
    </div>
  </div>
  <div class="content" id="content"></div>
  <div class="controls">
    <button onclick="replay()">Replay</button>
    <button onclick="skipToEnd()">Skip to End</button>
  </div>
</div>
</div>
<script>
const L=[
    {t:"~/openclaw $ entroly demo",c:"#e5e7eb",b:true,d:600},
    {t:"",c:"#d4d4d4",b:false,d:1650},
    {t:"Indexing workspace...",c:"#6b7280",b:false,d:1700},
    {t:"✓ 24 files indexed (2,348 tokens) in 0.05ms",c:"#6ee7b7",b:false,d:2550},
    {t:"",c:"#d4d4d4",b:false,d:3600},
    {t:"Without Entroly",c:"#f87171",b:true,d:3650},
    {t:"  Budget: 2,048 tokens",c:"#9ca3af",b:false,d:3700},
    {t:"  Files loaded: 15 of 24    (9 files invisible)",c:"#9ca3af",b:false,d:3750},
    {t:"  Tokens used:  2,031 / 2,048  (99.2% of budget)",c:"#9ca3af",b:false,d:3800},
    {t:"  Missing:",c:"#6b7280",b:false,d:5050},
    {t:"    ✗ skills/system.md         — can't manage Docker",c:"#f87171",b:false,d:5100},
    {t:"    ✗ tools/search_emails.json — can't search inbox",c:"#f87171",b:false,d:5150},
    {t:"    ✗ tools/send_email.json    — can't send email",c:"#f87171",b:false,d:5200},
    {t:"    ✗ tools/run_tests.json     — can't run tests",c:"#f87171",b:false,d:5250},
    {t:"    ... and 5 more",c:"#6b7280",b:false,d:5300},
    {t:"",c:"#d4d4d4",b:false,d:6550},
    {t:"With Entroly",c:"#6ee7b7",b:true,d:6600},
    {t:"  Budget: 2,048 tokens",c:"#9ca3af",b:false,d:6650},
    {t:"  Files loaded: 24 of 24   (100% coverage)",c:"#e5e7eb",b:false,d:6700},
    {t:"  Tokens used:  1,812 / 2,048  (88.5% — 22.7% saved)",c:"#e5e7eb",b:false,d:6750},
    {t:"  Compression:",c:"#6b7280",b:false,d:7800},
    {t:"    SOUL.md, MEMORY.md              → full",c:"#d4d4d4",b:false,d:7850},
    {t:"    daily/2024-03-20.md +1 more     → skeleton",c:"#d4d4d4",b:false,d:7900},
    {t:"    tools/*.json (9 files)           → reference",c:"#d4d4d4",b:false,d:7950},
    {t:"",c:"#d4d4d4",b:false,d:9200},
    {t:"✓ All 24 files visible. 22.7% fewer tokens. 0.05ms.",c:"#6ee7b7",b:true,d:9250},
    {t:"",c:"#d4d4d4",b:false,d:10800},
    {t:"  Start now:  pip install entroly && entroly proxy",c:"#6b7280",b:false,d:10850}
];
const content=document.getElementById('content');
let timeouts=[];
function clear(){ timeouts.forEach(clearTimeout); timeouts=[]; content.innerHTML=''; }
function play() {
  clear();
  L.forEach((l,i) => {
    const div=document.createElement('div');
    div.className='line';
    if(l.b) div.style.fontWeight='700';
    div.style.color=l.c;
    div.textContent=l.t||'\u00a0';
    content.appendChild(div);
    timeouts.push(setTimeout(()=>div.classList.add('show'), l.d));
  });
  const cur=document.createElement('span');
  cur.className='cursor';
  content.appendChild(cur);
  const lastDelay=L[L.length-1].d+400;
  timeouts.push(setTimeout(()=>cur.classList.add('show'), lastDelay));
}
function replay() { play(); }
function skipToEnd() {
  clear();
  L.forEach(l => {
    const div=document.createElement('div');
    div.className='line show';
    if(l.b) div.style.fontWeight='700';
    div.style.color=l.c;
    div.textContent=l.t||'\u00a0';
    content.appendChild(div);
  });
  const cur=document.createElement('span');
  cur.className='cursor show';
  content.appendChild(cur);
}
play();
</script>
</body>
</html>
