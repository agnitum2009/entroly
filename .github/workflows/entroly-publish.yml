name: Publish Entroly to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for PyPI trusted publishing (OIDC)

jobs:
  # ─── Publish entroly Python wrapper to PyPI ───────────────────────────────
  # The Rust engine (entroly-core) runs inside Docker — no native wheel needed.
  publish-wrapper:
    name: Publish entroly wrapper to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build --wheel --sdist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
