name: Publish entroly-core wheels to PyPI

# Builds multi-platform Rust wheels using maturin and publishes to PyPI.
# This ensures `pip install "entroly[native]"` always gets the latest Rust engine.
#
# Triggers on version tags (entroly-v*) — same as the Docker/PyPI workflow.
# Uses PyO3/maturin-action for cross-platform builds (linux x86_64, aarch64,
# macOS universal2, Windows x86_64).

on:
  push:
    tags:
      - 'entroly-v*'
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: entroly-core
          command: build
          args: --release --out dist
          # Build both x86_64 and aarch64 on Linux via cross-compilation
          manylinux: auto
          target: ${{ matrix.os == 'ubuntu-latest' && 'x86_64' || '' }}

      - name: Build aarch64 wheels (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: entroly-core
          command: build
          args: --release --out dist
          manylinux: auto
          target: aarch64

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: entroly-core/dist

  publish-to-pypi:
    name: Publish entroly-core to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    # Only publish on actual version tags (not workflow_dispatch without a tag)
    if: startsWith(github.ref, 'refs/tags/entroly-v')
    permissions:
      id-token: write  # required for trusted publishing (OIDC)

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: List wheels built
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true  # safe to retry if partial publish occurred
